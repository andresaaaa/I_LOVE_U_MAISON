<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For my first and only true love</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Caveat:wght@600&display=swap');

  * { box-sizing: border-box; margin:0; padding:0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: linear-gradient(-45deg, #4a0010, #800020, #e31b6d, #4a0010);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* top bar like the screenshot */
  .topbar {
    width: 100%;
    background: #000;
    color: #cfd6ff;
    font-size: 7px;
    text-align: center;
    padding: 6px 4px;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #444;
    line-height: 1.4;
  }
  .topbar span.esc {
    border: 1px solid #cfd6ff;
    padding: 1px 4px;
    margin-left: 6px;
    display: inline-block;
  }

  /* new love background styles */
  .love-background {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .glow-orb {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,105,180,0.4) 30%, transparent 70%);
    filter: blur(40px);
    animation: pulse 4s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  }

  .falling-petals, .floating-bubbles, .bokeh-lights {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .petal {
    position: absolute;
    background: #ff4d6d;
    border-radius: 15px 0 15px 0;
    box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3);
    opacity: 0.7;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
  }

  .bubble-heart {
    position: absolute;
    bottom: -10%;
    color: rgba(255,255,255,0.4);
    font-size: 20px;
    animation: floatUp infinite ease-in;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 0.8; }
    100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
  }

  .bokeh {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
    animation: floatSlow infinite alternate ease-in-out;
  }

  @keyframes floatSlow {
    0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
    100% { transform: translate(30px, -50px) scale(1.5); opacity: 0.6; }
  }

  /* content */
  .content {
    position: relative;
    z-index: 5;
    text-align: center;
    margin-top: 6vh;
    width: 92%;
    max-width: 900px;
    padding: 0 8px;
  }

  h1 {
    color: #ffffff;
    font-size: clamp(14px, 6.5vw, 40px);
    line-height: 1.7;
    text-shadow:
      2px 2px 0 #ff5d8f,
      -1px -1px 0 #000,
      1px -1px 0 #000,
      -1px 1px 0 #000,
      1px 1px 0 #000;
    letter-spacing: 0.5px;
    animation: flicker 3s infinite;
    word-wrap: break-word;
  }

  @keyframes flicker {
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: 0.85; }
    98% { opacity: 1; }
  }

  .question {
    font-family: 'Caveat', cursive;
    color: #ffffff;
    font-size: clamp(18px, 5.5vw, 32px);
    margin: 4vh 0 3vh;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  }

  .buttons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    position: relative;
    min-height: 130px;
    width: 100%;
  }

  button {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 3vw, 16px);
    padding: 14px 16px;
    background: #e9e3f5;
    color: #1a1a2e;
    border: 3px solid #1a1a2e;
    box-shadow: 4px 4px 0 #000;
    cursor: pointer;
    text-decoration: underline;
    image-rendering: pixelated;
    transition: transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    white-space: nowrap;
  }

  button:active {
    transform: translate(2px,2px);
    box-shadow: 2px 2px 0 #000;
  }

  #joinBtn:hover {
    background: #ffd6ec;
    transform: scale(1.05);
  }

  #noBtn {
    position: relative;
  }

  .scroll-bottom {
    position: absolute;
    bottom: 5%;
    width: 55%;
    max-width: 300px;
    height: 5px;
    background: rgba(255,255,255,0.85);
    border-radius: 4px;
    z-index: 6;
  }

  .footer-icons {
    position: absolute;
    bottom: 1.2%;
    right: 3%;
    color: #cfd6ff;
    font-size: 9px;
    z-index: 6;
    opacity: 0.7;
  }

  #message {
    margin-top: 2.5vh;
    color: #fff;
    font-family: 'Caveat', cursive;
    font-size: clamp(18px, 5vw, 28px);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    min-height: 30px;
    padding: 0 6px;
  }

  /* small phones */
  @media (max-width: 380px) {
    .content { margin-top: 5vh; }
    button { padding: 12px 12px; font-size: 9px; }
    .buttons { gap: 12px; min-height: 110px; }
    .topbar { font-size: 6px; }
  }

  /* landscape phones - shrink vertical elements */
  @media (max-height: 480px) and (orientation: landscape) {
    .content { margin-top: 3vh; }
    h1 { font-size: clamp(12px, 4vw, 22px); line-height: 1.4; }
    .question { margin: 2vh 0 2vh; font-size: clamp(14px, 3.5vw, 22px); }
    .buttons { min-height: 90px; }
    button { padding: 10px 12px; font-size: 9px; }
  }

  /* tablets and desktop enhancements */
  @media (min-width: 700px) {
    .topbar { font-size: 9px; padding: 6px 0; }
    .buttons { gap: 40px; min-height: 90px; }
    button { padding: 18px 30px; font-size: clamp(12px, 1.6vw, 18px); }
  }
</style>
</head>
<body>

  <div class="topbar">
    By ANDY to First and Only ❤️❤️❤️<span class="esc">MAISON</span>❤️❤️❤️
  </div>

  <div class="love-background">
    <div class="glow-orb"></div>
    <div class="falling-petals" id="fallingPetals"></div>
    <div class="floating-bubbles" id="floatingBubbles"></div>
    <div class="bokeh-lights" id="bokehLights"></div>
  </div>

  <div class="content">
    <h1>FOR MY FIRST<br>AND ONLY<br>TRUE LOVE</h1>
    <p class="question">do you want to...</p>
    <div class="buttons">
      <button id="joinBtn">JOIN</button>
      <button id="noBtn">I DON'T CARE</button>
    </div>
    <p id="message"></p>
  </div>

  <div class="scroll-bottom"></div>
 

<script>
  const joinBtn = document.getElementById('joinBtn');
  const noBtn = document.getElementById('noBtn');
  const message = document.getElementById('message');
  const buttonsContainer = document.querySelector('.buttons');

  const joinMessages = [
    "yay! i knew you'd say yes ❤",
    "you're officially my whole world now ✨",
    "forever and beyond 💫"
  ];

  // generate falling petals
  const petalsContainer = document.getElementById('fallingPetals');
  const petalCount = 30;
  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 100 + '%';
    const size = 10 + Math.random() * 15;
    petal.style.width = size + 'px';
    petal.style.height = size + 'px';
    const duration = 5 + Math.random() * 5;
    petal.style.animationDuration = duration + 's';
    petal.style.animationDelay = (Math.random() * 5) + 's';
    petalsContainer.appendChild(petal);
  }

  // generate floating bubble hearts
  const bubblesContainer = document.getElementById('floatingBubbles');
  const bubbleCount = 20;
  for (let i = 0; i < bubbleCount; i++) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble-heart';
    bubble.innerHTML = '❤';
    bubble.style.left = Math.random() * 100 + '%';
    const size = 10 + Math.random() * 20;
    bubble.style.fontSize = size + 'px';
    const duration = 8 + Math.random() * 7;
    bubble.style.animationDuration = duration + 's';
    bubble.style.animationDelay = (Math.random() * 5) + 's';
    bubblesContainer.appendChild(bubble);
  }

  // generate bokeh lights
  const bokehContainer = document.getElementById('bokehLights');
  const bokehCount = 15;
  for (let i = 0; i < bokehCount; i++) {
    const bokeh = document.createElement('div');
    bokeh.className = 'bokeh';
    bokeh.style.left = Math.random() * 100 + '%';
    bokeh.style.top = Math.random() * 100 + '%';
    const size = 20 + Math.random() * 60;
    bokeh.style.width = size + 'px';
    bokeh.style.height = size + 'px';
    const duration = 4 + Math.random() * 4;
    bokeh.style.animationDuration = duration + 's';
    bokeh.style.animationDelay = (Math.random() * 3) + 's';
    bokehContainer.appendChild(bokeh);
  }

  joinBtn.addEventListener('click', () => {
    window.location.href = 'principal.html';
  });

  // the "i don't care" button runs away when you try to touch it
  function moveNoButton() {
    const containerRect = buttonsContainer.getBoundingClientRect();
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;
    const maxX = Math.max(containerRect.width - btnWidth, 0);
    const maxY = Math.max(containerRect.height - btnHeight, 0);

    const randX = Math.random() * maxX;
    const randY = Math.random() * maxY;

    noBtn.style.position = 'absolute';
    noBtn.style.left = randX + 'px';
    noBtn.style.top = randY + 'px';
  }

  noBtn.addEventListener('mouseenter', moveNoButton);
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    moveNoButton();
  });

  noBtn.addEventListener('click', (e) => {
    e.preventDefault();
    moveNoButton();
  });
</script>
</body>
</html>
